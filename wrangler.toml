name = "seekosint"
pages_build_output_dir = ".open-next"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

[[kv_namespaces]]
binding = "KV"
id = "9848ade51876441085062de12d3531a5"

[[d1_databases]]
binding = "DB"
database_name = "seek-osint"
database_id = "7229602c-e1a3-440e-82f8-1b7912eed83a"

# ── Cron triggers ────────────────────────────────────────────────────────────
# Daily re-query of all saved targets at 03:00 UTC.
# The cron worker lives in worker/cron.ts and is deployed separately
# via `wrangler deploy --config wrangler.cron.toml` (see that file).
# Kept here as documentation; Pages Functions don't support cron directly.
# [triggers]
# crons = ["0 3 * * *"]
