## wrangler.cron.toml
## Standalone Worker for the hourly blocklist refresh + daily target sweep.
## Deploy with: wrangler deploy --config wrangler.cron.toml
##
## This is kept separate from wrangler.toml (which drives the Pages build)
## because Cloudflare Pages doesn't support [triggers] crons.

name = "seekyou-cron"
main = "worker/cron.ts"
compatibility_date = "2025-05-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
# Hourly — blocklist refresh checks its own TTL (blocklist_meta table)
# and skips if already fresh. Saved-target sweep is lightweight when
# KV cache is warm. Two jobs, one trigger.
crons = ["0 * * * *"]

[[kv_namespaces]]
binding = "KV"
id = "9848ade51876441085062de12d3531a5"

[[d1_databases]]
binding = "DB"
database_name = "seekyou"
database_id = "7229602c-e1a3-440e-82f8-1b7912eed83a"

## Secrets (set via `wrangler secret put --config wrangler.cron.toml <NAME>`):
##   NVD_KEY          — NVD API key for CVE enrichment
##   ABUSECH_KEY      — abuse.ch API key
##   ADMIN_TOKEN      — (optional) internal admin token
##   WEBHOOK_URL      — (optional) POST target for change notifications
